<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RemoteControl</title>
<style>
  :root {
    --bg: #1a1a2e; --card: #16213e; --primary: #0f3460;
    --accent: #e94560; --green: #4caf50; --text: #eee; --muted: #aaa;
    --input-bg: #222; --border: #333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000; color: var(--text); overflow: hidden;
    height: 100vh; width: 100vw;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
  }

  /* ====== Connection Panel ====== */
  #panel {
    position: fixed; inset: 0; z-index: 10;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.3s;
  }
  #panel.hidden { opacity: 0; pointer-events: none; }

  #panel .box {
    background: var(--card); border-radius: 16px; padding: 32px 24px;
    width: 90%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  #panel h1 { font-size: 24px; margin-bottom: 4px; text-align: center; }
  #panel .subtitle { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 24px; }

  #panel label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; margin-top: 16px; }
  #panel input {
    width: 100%; padding: 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--input-bg);
    color: var(--text); font-size: 16px; outline: none;
  }
  #panel input:focus { border-color: var(--accent); }

  #panel .row { display: flex; gap: 12px; margin-top: 16px; }
  #panel button {
    flex: 1; padding: 14px; border-radius: 8px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  #panel button:active { opacity: 0.7; }
  .btn-connect { background: var(--accent); color: #fff; }
  .btn-history { background: var(--primary); color: #fff; }

  #history-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  #history-list .chip {
    background: var(--primary); color: var(--text);
    padding: 4px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; border: none;
  }
  #history-list .chip:hover { background: var(--accent); }
  #history-list .chip.del {
    background: transparent; color: var(--muted); font-size: 10px; padding: 4px 6px;
  }

  /* ====== Status Bar ====== */
  #status-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 5;
    height: 32px; display: flex; align-items: center; padding: 0 12px;
    background: rgba(0,0,0,0.7); font-size: 11px;
    opacity: 0; transition: opacity 0.3s;
  }
  #status-bar.visible { opacity: 1; }

  #status-bar .dot {
    width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0;
  }
  .dot.on { background: var(--green); }
  .dot.off { background: var(--accent); }

  #status-bar .text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #status-bar button {
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent); padding: 2px 10px; border-radius: 4px;
    font-size: 10px; cursor: pointer; margin-left: 8px; flex-shrink: 0;
  }

  /* ====== Canvas ====== */
  #canvas-container {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; touch-action: none;
  }
  canvas {
    display: block; max-width: 100vw; max-height: 100vh; object-fit: contain;
  }

  /* ====== Gesture Dot ====== */
  #dot {
    position: fixed; z-index: 8;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.8), rgba(255,255,255,0.2));
    border: 1.5px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 4px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
    top: 52px; right: 20px;
    display: none;
    transform: translate(0, 0);
    transition: transform 0.2s ease, opacity 0.2s;
    cursor: pointer;
    touch-action: none;
  }
  #dot.connected { display: block; opacity: 0.9; }
  #dot.reposition { transform: scale(1.4); opacity: 0.85; }

  /* Inner dot */
  #dot .inner {
    position: absolute;
    width: 14px; height: 14px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    top: 50%; left: 50%;
    margin-left: -7px; margin-top: -7px;
    transition: transform 0.15s ease, margin 0.15s ease;
  }
  #dot .inner.clicked { transform: scale(0.3); }
  #dot .inner.up { margin-top: -20px; }
  #dot .inner.down { margin-top: 6px; }
</style>
</head>
<body>

<!-- Connection Panel -->
<div id="panel">
  <div class="box">
    <h1>RemoteControl</h1>
    <p class="subtitle">网页远程控制</p>
    <label>服务器地址</label>
    <input id="host" type="text" placeholder="例: 192.168.1.100" autocomplete="off" autocorrect="off">
    <label>端口</label>
    <input id="port" type="number" value="8080" placeholder="8080">
    <div class="row">
      <button id="btn-connect" class="btn-connect">连接</button>
      <button id="btn-history" class="btn-history">历史</button>
    </div>
    <div id="history-list"></div>
    <div id="connect-status" style="margin-top:12px;font-size:13px;text-align:center;color:var(--muted);min-height:20px;"></div>
  </div>
</div>

<!-- Status Bar -->
<div id="status-bar">
  <span id="status-dot" class="dot off"></span>
  <span class="text" id="status-text">未连接</span>
  <button id="btn-show-panel">换个地址</button>
</div>

<!-- Remote Screen -->
<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<!-- Gesture Dot -->
<div id="dot"><div class="inner"></div></div>

<script>
(function() {
  const STORAGE_KEY = 'remotecontrol_history';
  const MAX_HISTORY = 10;
  const SWIPE_THRESHOLD = 30;
  const HOLD_MS = 300;
  const LONG_PRESS_MS = 2000;

  // DOM
  const panel = document.getElementById('panel');
  const elHost = document.getElementById('host');
  const elPort = document.getElementById('port');
  const btnConnect = document.getElementById('btn-connect');
  const btnHistory = document.getElementById('btn-history');
  const historyList = document.getElementById('history-list');
  const connectStatus = document.getElementById('connect-status');
  const statusBar = document.getElementById('status-bar');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const btnShowPanel = document.getElementById('btn-show-panel');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const dot = document.getElementById('dot');
  const dotInner = dot.querySelector('.inner');

  let ws = null;
  let connected = false;
  let frameCount = 0;
  let currentHost = '';
  let currentPort = 8080;

  // Touch gesture tracking (remote screen)
  let gesturePoints = [];
  let gestureStartTime = 0;
  let gestureActive = false;

  // Dot tracking
  let dotX = 0, dotY = 0;
  let dotDownX, dotDownY, dotDownTime;
  let dotReposition = false;
  let dotOffsetX, dotOffsetY;
  let dotSwipeDir = 0;
  let dotSwipeStarted = false;
  let dotLastMoveTime = 0;
  let dotLongPressTimer;

  // ========== History ==========
  function loadHistory() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }

  function saveHistory(host, port) {
    let h = loadHistory();
    let entry = host + ':' + port;
    h = h.filter(e => e !== entry);
    h.unshift(entry);
    if (h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
    renderHistory();
  }

  function renderHistory() {
    let h = loadHistory();
    historyList.innerHTML = '';
    if (h.length === 0) { historyList.innerHTML = '<span style="font-size:11px;color:var(--muted);">暂无历史</span>'; return; }
    h.forEach(entry => {
      let parts = entry.split(':');
      let chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = entry;
      chip.onclick = () => { elHost.value = parts[0]; elPort.value = parts[1] || '8080'; };
      historyList.appendChild(chip);
    });
    let del = document.createElement('span');
    del.className = 'chip del';
    del.textContent = '清除';
    del.onclick = () => { localStorage.removeItem(STORAGE_KEY); renderHistory(); };
    historyList.appendChild(del);
  }

  let lastHistory = loadHistory();
  if (lastHistory.length > 0) {
    let parts = lastHistory[0].split(':');
    elHost.value = parts[0] || '';
    elPort.value = parts[1] || '8080';
  }
  renderHistory();

  // ========== Connection ==========
  btnConnect.addEventListener('click', () => {
    let host = elHost.value.trim();
    let port = parseInt(elPort.value) || 8080;
    if (!host) { alert('请输入服务器地址'); return; }
    connect(host, port);
  });

  function connect(host, port) {
    if (ws) { ws.close(); ws = null; }
    currentHost = host; currentPort = port;
    connectStatus.innerHTML = '<span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px;"></span> 连接中...';
    btnConnect.disabled = true;

    let url = 'ws://' + host + ':' + port;
    try { ws = new WebSocket(url); ws.binaryType = 'arraybuffer'; }
    catch(e) { connectStatus.textContent = '连接失败: ' + e.message; btnConnect.disabled = false; return; }

    ws.onopen = () => {
      connected = true; frameCount = 0;
      saveHistory(host, port);
      panel.classList.add('hidden');
      statusBar.classList.add('visible');
      statusDot.className = 'dot on';
      statusText.textContent = '已连接 ' + host + ':' + port;
      connectStatus.textContent = '';
      btnConnect.disabled = false;
      dot.classList.add('connected');
      initDotPos();
    };

    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        if (event.data.startsWith('HB:')) { statusText.textContent = '已连接 ' + host + ':' + port + ' 帧#' + event.data.split(':')[1]; return; }
        return;
      }
      frameCount++;
      let data = new Uint8Array(event.data);
      let blob = new Blob([data], { type: 'image/jpeg' });
      let url = URL.createObjectURL(blob);
      let img = new Image();
      img.onload = () => {
        let cw = canvas.parentElement.clientWidth;
        let ch = canvas.parentElement.clientHeight;
        let scale = Math.min(cw / img.width, ch / img.height);
        canvas.width = img.width * scale * (window.devicePixelRatio || 1);
        canvas.height = img.height * scale * (window.devicePixelRatio || 1);
        canvas.style.width = (img.width * scale) + 'px';
        canvas.style.height = (img.height * scale) + 'px';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    };

    ws.onclose = () => { if (connected) { connected = false; disconnectUI('连接已断开'); } };
    ws.onerror = () => { if (!connected) { connectStatus.textContent = '无法连接到服务器'; btnConnect.disabled = false; } };
  }

  function disconnectUI(reason) {
    connected = false;
    if (ws) { ws.close(); ws = null; }
    panel.classList.remove('hidden');
    statusBar.classList.remove('visible');
    statusDot.className = 'dot off';
    statusText.textContent = '未连接';
    connectStatus.textContent = reason || '';
    btnConnect.disabled = false;
    dot.classList.remove('connected');
  }

  function disconnect() { if (ws) { ws.close(); ws = null; } disconnectUI('已断开'); }

  btnShowPanel.addEventListener('click', () => { panel.classList.remove('hidden'); elHost.value = currentHost; elPort.value = currentPort; });

  // ========== Remote Screen Touch ==========
  function getCanvasPos(e) {
    let rect = canvas.getBoundingClientRect();
    let cx, cy;
    if (e.touches) { if (e.touches.length === 0) return null; cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
    else { cx = e.clientX; cy = e.clientY; }
    return { x: (cx - rect.left) / rect.width, y: (cy - rect.top) / rect.height };
  }

  function startGesture(pos) { gesturePoints = [pos.x, pos.y]; gestureStartTime = Date.now(); gestureActive = true; }
  function addGesturePoint(pos) { if (!gestureActive) return; gesturePoints.push(pos.x, pos.y); }
  function endGesture(pos) {
    if (!gestureActive || gesturePoints.length < 2) { gestureActive = false; return; }
    gesturePoints.push(pos.x, pos.y);
    sendTouchBatch(Date.now() - gestureStartTime);
    gestureActive = false;
  }

  function sendTouchBatch(duration) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    let cmd = 'TOUCH_BATCH:' + duration;
    for (let i = 0; i < gesturePoints.length; i += 2) {
      cmd += ';' + gesturePoints[i].toFixed(6) + ',' + gesturePoints[i+1].toFixed(6);
    }
    ws.send(cmd);
  }

  canvas.addEventListener('mousedown', e => { if (!connected) return; e.preventDefault(); startGesture(getCanvasPos(e)); });
  canvas.addEventListener('mousemove', e => { if (!gestureActive) return; e.preventDefault(); addGesturePoint(getCanvasPos(e)); });
  canvas.addEventListener('mouseup', e => { if (!gestureActive) return; e.preventDefault(); endGesture(getCanvasPos(e)); });
  canvas.addEventListener('mouseleave', () => { gestureActive = false; });

  canvas.addEventListener('touchstart', e => { if (!connected) return; e.preventDefault(); startGesture(getCanvasPos(e)); }, { passive: false });
  canvas.addEventListener('touchmove', e => { if (!gestureActive) return; e.preventDefault(); addGesturePoint(getCanvasPos(e)); }, { passive: false });
  canvas.addEventListener('touchend', e => {
    if (!gestureActive) return; e.preventDefault();
    let pos = getCanvasPos(e);
    if (!pos && gesturePoints.length >= 2) pos = { x: gesturePoints[gesturePoints.length-2], y: gesturePoints[gesturePoints.length-1] };
    if (pos) endGesture(pos);
  }, { passive: false });
  canvas.addEventListener('touchcancel', () => { gestureActive = false; });

  // ========== Gesture Dot ==========
  function initDotPos() {
    dotX = window.innerWidth - 70;
    dotY = 52;
    dot.style.left = dotX + 'px';
    dot.style.top = dotY + 'px';
    dot.style.right = 'auto';
  }

  function sendCmd(cmd) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(cmd); }

  function dotDown(e) {
    e.preventDefault();
    let t = e.touches ? e.touches[0] : e;
    dotDownX = t.clientX; dotDownY = t.clientY;
    dotDownTime = Date.now();
    dotReposition = false; dotSwipeDir = 0; dotSwipeStarted = false;
    dotLastMoveTime = dotDownTime;
    clearDotAnims();

    // Long press to reposition
    clearTimeout(dotLongPressTimer);
    dotLongPressTimer = setTimeout(() => {
      dotReposition = true;
      dotOffsetX = dotX - t.clientX;
      dotOffsetY = dotY - t.clientY;
      dot.classList.add('reposition');
    }, LONG_PRESS_MS);
  }

  function dotMove(e) {
    e.preventDefault();
    let t = e.touches ? e.touches[0] : e;
    let dx = t.clientX - dotDownX, dy = t.clientY - dotDownY;
    let adx = Math.abs(dx), ady = Math.abs(dy);

    if (dotReposition) {
      dotX = Math.max(0, Math.min(window.innerWidth - 48, t.clientX + dotOffsetX));
      dotY = Math.max(0, Math.min(window.innerHeight - 48, t.clientY + dotOffsetY));
      dot.style.left = dotX + 'px'; dot.style.top = dotY + 'px';
      return;
    }

    if (adx > SWIPE_THRESHOLD || ady > SWIPE_THRESHOLD) {
      clearTimeout(dotLongPressTimer);
      if (!dotSwipeStarted) {
        dotSwipeStarted = true;
        dotSwipeDir = ady >= adx ? (dy < 0 ? 1 : 2) : 0;
        if (dotSwipeDir === 1) dotInner.classList.add('up');
        else if (dotSwipeDir === 2) dotInner.classList.add('down');
      }
    }

    // Track significant moves for hold detection
    if (adx > 4 || ady > 4) dotLastMoveTime = Date.now();
  }

  function dotUp(e) {
    e.preventDefault();
    clearTimeout(dotLongPressTimer);

    if (dotReposition) { dot.classList.remove('reposition'); return; }
    if (!connected) return;

    let heldStill = (Date.now() - dotLastMoveTime) >= HOLD_MS;

    if (!dotSwipeStarted) {
      // Click → Back
      dotInner.classList.add('clicked');
      setTimeout(() => dotInner.classList.remove('clicked'), 200);
      sendCmd('BACK');
    } else if (dotSwipeDir === 1) {
      sendCmd(heldStill ? 'RECENTS' : 'HOME');
    } else if (dotSwipeDir === 2) {
      sendCmd(heldStill ? 'QUICK_SETTINGS' : 'NOTIFICATIONS');
    }

    clearDotAnims();
  }

  function clearDotAnims() {
    dotInner.classList.remove('up', 'down', 'clicked');
  }

  dot.addEventListener('touchstart', dotDown, { passive: false });
  dot.addEventListener('touchmove', dotMove, { passive: false });
  dot.addEventListener('touchend', dotUp);
  dot.addEventListener('touchcancel', dotUp);
  dot.addEventListener('mousedown', dotDown);
  dot.addEventListener('mousemove', (e) => { if (dotReposition || dotSwipeStarted) dotMove(e); });
  dot.addEventListener('mouseup', dotUp);
  dot.addEventListener('mouseleave', dotUp);

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (!connected) return;
    switch(e.key) {
      case 'Escape': sendCmd('BACK'); break;
      case 'Home': sendCmd('HOME'); break;
      case 'F5': sendCmd('RECENTS'); e.preventDefault(); break;
    }
  });

  console.log('RemoteControl 已就绪');
})();
</script>
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
